name: 'Resolve Branch'
description: 'Resolve the given base branch or return default branch. With optional existence check.'

inputs:
  token:
    description: 'GitHub Token'
    required: true
  repository:
    description: 'Repository to resolve the branch in (e.g. owner/repo)'
    required: true
  branch_name:
    description: 'The branch name to resolve (defaults to repository default branch)'
    required: false
    default: ''
  check_if_exist:
    description: 'Check if the branch exists'
    required: false
    default: 'true'
  silent_fail:
    description: 'Return an empty base_branch instead of failing when the branch does not exist. Authentication, permission and transport errors always fail.'
    required: false
    default: 'false'

outputs:
  base_branch:
    description: 'The base branch name, or empty if the branch does not exist and silent_fail is true'

runs:
  using: 'node20'
  main: 'dist/index.js'
