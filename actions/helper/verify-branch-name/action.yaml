name: 'Helper Verify-branch-name'
description: 'Verify the head branch of a pull request matches a pattern and check whether it comes from a fork'

inputs:
  branch_pattern:
    description: 'Regex pattern to match branch names (e.g. "^release-please--branches--.*$"). POSIX extended regex syntax, unanchored and case-sensitive. An empty pattern skips the check.'
    required: true
  reject_forks:
    description: 'Reject PRs from forked repositories. When true, only PRs from branches in the same repository will be approved.'
    required: false
    default: 'true'
  error_on_failure:
    description: 'When true, the action fails if any of the checks fail. When false, the action succeeds and reports the results via its outputs.'
    required: false
    default: 'false'
  head_repo_full_name:
    description: 'Full name of the head repository (e.g. "owner/repo"). Defaults to github.event.pull_request.head.repo.full_name of the triggering event.'
    required: false
    default: ${{ github.event.pull_request.head.repo.full_name }}
  base_repo_full_name:
    description: 'Full name of the base repository (e.g. "owner/repo"). Defaults to github.event.pull_request.base.repo.full_name of the triggering event.'
    required: false
    default: ${{ github.event.pull_request.base.repo.full_name }}
  head_ref:
    description: 'The head branch name (e.g. "feature/my-branch"). Defaults to github.event.pull_request.head.ref of the triggering event.'
    required: false
    default: ${{ github.event.pull_request.head.ref }}

outputs:
  verified:
    description: 'True if all checks pass, false otherwise.'
  branch_pattern_verified:
    description: 'True if the branch name matches the pattern, false otherwise.'
  fork_verified:
    description: 'True if the PR is from the same repository or forks are allowed, false otherwise.'

runs:
  using: 'node20'
  main: 'dist/index.js'
