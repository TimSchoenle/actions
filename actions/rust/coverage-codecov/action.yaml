name: 'Rust Coverage (Codecov)'
description: 'Action that runs cargo llvm-cov to generate code coverage and uploads to Codecov.'

inputs:
  codecov_token:
    description: 'Token for Codecov'
    required: true
  repository:
    description: 'Target repository in the format owner/repo. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  branch:
    description: 'Target branch to checkout. Defaults to the current branch.'
    required: false
    default: ${{ github.head_ref || github.ref_name }}
  source_directory:
    description: 'Directory containing the Rust project'
    required: false
    default: '.'
  test_arguments:
    description: 'Additional arguments to pass to cargo nextest'
    required: false
    default: '--all-features --workspace'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: ${{ inputs.repository }}
        persist-credentials: false
        fetch-depth: 0
        ref: ${{ inputs.branch }}

    - name: Install stable toolchain
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

    - name: Install cargo-llvm-cov and nextest
      uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
      with:
        tool: cargo-llvm-cov,nextest

    - name: Generate code coverage
      shell: bash
      env:
        TEST_ARGUMENTS: ${{ inputs.test_arguments }}
      working-directory: ${{ inputs.source_directory }}
      run: |
        # shellcheck disable=SC2206
        args=($TEST_ARGUMENTS)
        cargo llvm-cov nextest --lcov --output-path lcov.info "${args[@]}"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
      with:
        token: ${{ inputs.codecov_token }}
        files: lcov.info
        fail_ci_if_error: true
