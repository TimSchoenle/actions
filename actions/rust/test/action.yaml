name: 'Rust Test'
description: 'Action that runs cargo nextest to verify Rust code passes tests.'

inputs:
  repository:
    description: 'Target repository in the format owner/repo. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  branch:
    description: 'Target branch to checkout. Defaults to the current branch.'
    required: false
    default: ${{ github.head_ref || github.ref_name }}
  source_directory:
    description: 'Directory containing the Rust project'
    required: false
    default: '.'
  test_arguments:
    description: 'Additional arguments to pass to cargo nextest'
    required: false
    default: '--all-features --workspace'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ inputs.repository }}
        persist-credentials: false
        fetch-depth: 0
        ref: ${{ inputs.branch }}

    - name: Install stable toolchain
      uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1.15.2

    - name: Install nextest
      uses: taiki-e/install-action@2e9d707ef49c9b094d45955b60c7e5c0dfedeb14 # v2.66.5
      with:
        tool: nextest

    - name: Run tests
      shell: bash
      env:
        TEST_ARGUMENTS: ${{ inputs.test_arguments }}
      working-directory: ${{ inputs.source_directory }}
      run: |
        # shellcheck disable=SC2206
        args=($TEST_ARGUMENTS)
        cargo nextest run "${args[@]}"
