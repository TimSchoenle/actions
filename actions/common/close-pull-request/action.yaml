name: 'Close Pull Request'
description: 'Closes a pull request'
inputs:
  pull_request_id:
    description: 'The ID of the pull request to close'
    required: true
  repository:
    description: 'The repository where the pull request resides'
    required: true
  token:
    description: 'The GitHub token to use'
    required: true
  comment:
    description: 'Optional comment to post when closing the PR'
    required: false

outputs:
  closed:
    description: 'Whether the pull request was closed (true) or does not exist (false). Closing an already-closed pull request is idempotent and reports true.'

runs:
  using: 'node20'
  main: 'dist/index.js'
