name: 'Java-gradle Auto-spotless'
description: 'Automatically apply spotless formatting and commit changes.'

inputs:
  bot_app_id:
    description: 'Bot App ID to run the workflow. The bot needs permissions to write content and write pull requests.'
    required: true
  bot_private_key:
    description: 'Bot Private Key to run the workflow'
    required: true
  repository:
    description: 'Target repository in the format owner/repo. Defaults to the current repository.'
    required: false
    default: ${{ github.repository }}
  branch:
    description: 'Target branch to checkout and commit to. Defaults to the current branch.'
    required: false
    default: ${{ github.head_ref || github.ref_name }}
  gradle_spotless_command:
    description: 'Spotless command to run'
    required: false
    default: 'spotlessApply'
  java_version:
    description: 'Java version to use for the build.'
    required: true
  java_distribution:
    description: 'Java distribution to use'
    required: false
    default: 'temurin'
  java_package:
    description: 'The package type (jdk, jre, jdk+fx, jre+fx)'
    required: false
    default: 'jdk'
  gradle_wrapper_validation:
    description: 'Validate Gradle wrapper'
    required: false
    default: 'true'
  gradle_wrapper_allow_snapshots:
    description: 'Allow Gradle wrapper snapshots'
    required: false
    default: 'false'
  commit_message:
    description: 'Commit message to use for the auto-commit.'
    required: false
    default: 'style: apply spotless formatting'
  comment_message:
    description: 'Comment message to use for the auto-commit.'
    required: false
    default: 'Applied spotless formatting.'

outputs:
  changes_detected:
    description: 'Whether or not changes were detected.'
    value: ${{ steps.auto-commit.outputs.changes_detected }}

runs:
  using: 'composite'
  steps:
    - name: Harden Runner
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - name: Parse Repository
      id: parse_repo
      shell: bash
      env:
        REPOSITORY: ${{ inputs.repository }}
      run: |
        echo "owner=${REPOSITORY%%/*}" >> $GITHUB_OUTPUT
        echo "repo_name=${REPOSITORY##*/}" >> $GITHUB_OUTPUT

    - name: Generate Bot Token
      id: generate_token
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
      with:
        app-id: ${{ inputs.bot_app_id }}
        private-key: ${{ inputs.bot_private_key }}
        owner: ${{ steps.parse_repo.outputs.owner }}
        repositories: ${{ steps.parse_repo.outputs.repo_name }}
        permission-contents: write
        permission-pull-requests: write

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ inputs.repository }}
        persist-credentials: false
        fetch-depth: 0
        ref: ${{ inputs.branch }}
        token: ${{ steps.generate_token.outputs.token }}

    - name: Set up JDK
      uses: TimSchoenle/actions/actions/java-gradle/setup-base-environment@829bd1fb0b22243148114800e78f5506cb0a56cf # actions-java-gradle-setup-base-environment-v1.2.1
      with:
        java_version: ${{ inputs.java_version }}
        java_distribution: ${{ inputs.java_distribution }}
        java_package: ${{ inputs.java_package }}
        gradle_wrapper_validation: ${{ inputs.gradle_wrapper_validation }}
        gradle_wrapper_allow_snapshots: ${{ inputs.gradle_wrapper_allow_snapshots }}

    - name: Run spotless
      shell: bash
      env:
        SPOTLESS_COMMAND: ${{ inputs.gradle_spotless_command }}
      run: ./gradlew "$SPOTLESS_COMMAND"

    - name: Commit and Push if changed
      id: auto-commit
      uses: TimSchoenle/actions/actions/common/commit-changes@8f15b94f827ea2005c0e32cadc86bb50969633dd # actions-common-commit-changes-v1.1.4
      with:
        commit_message: ${{ inputs.commit_message }}
        token: ${{ steps.generate_token.outputs.token }}
        repository: ${{ inputs.repository }}
        branch: ${{ inputs.branch }}

    - name: Comment on PR
      if: steps.auto-commit.outputs.changes_detected == 'true' && github.event_name == 'pull_request' && inputs.repository == github.repository
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      env:
        COMMENT_MESSAGE: ${{ inputs.comment_message }}
        REPO_OWNER: ${{ steps.parse_repo.outputs.owner }}
        REPO_NAME: ${{ steps.parse_repo.outputs.repo_name }}
      with:
        github-token: ${{ steps.generate_token.outputs.token }}
        script: |
          github.rest.issues.createComment({
            owner: process.env.REPO_OWNER,
            repo: process.env.REPO_NAME,
            issue_number: context.issue.number,
            body: process.env.COMMENT_MESSAGE
          })
