name: 'Maintenance Auto-approve-pr'
description: 'Auto approve Pull Requests with the given user ids and branches.'

inputs:
  token:
    description: 'GitHub Token with pull-request: write access.'
    required: true
  user_ids:
    description: 'Comma-separated list of Database IDs of accepted authors (e.g. "29139614, 123456").'
    required: true
  ignore_empty_prs:
    description: 'Ignore PRs with 0 changes. Renovate seems to sometimes create multiple lock-files PR without changing anything.'
    required: false
    default: 'true'
  pr_url:
    description: 'URL of the pull request (e.g. "https://github.com/owner/repo/pull/123").'
    required: false
    default: ${{ github.event.pull_request.html_url }}
  branch_pattern:
    description: 'Regex pattern to match branch names (e.g. "^release-please--branches--.*$"). Uses extended regex syntax.'
    required: true
  reject_forks:
    description: 'Reject PRs from forked repositories. When true, only PRs from branches in the same repository will be approved.'
    required: false
    default: 'true'
  auto_approve_message:
    description: 'Message to include in the auto-approve comment.'
    required: false
    default: 'Auto-approved by workflow.'

runs:
  using: 'composite'
  steps:
    - name: Parse PR URL
      id: parse_pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_URL: ${{ inputs.pr_url }}
      run: |
        # Transforms https://github.com/owner/repo/pull/123 into repos/owner/repo/pulls/123
        ENDPOINT=$(echo "$PR_URL" | sed -E 's|.*/([^/]+/[^/]+)/pull/([0-9]+).*|repos/\1/pulls/\2|')

        gh api "$ENDPOINT" > pr.json

        HEAD_REF=$(jq -r '.head.ref' pr.json)
        HEAD_REPO=$(jq -r '.head.repo.full_name' pr.json)
        BASE_REPO=$(jq -r '.base.repo.full_name' pr.json)
        AUTHOR_ID=$(jq -r '.user.id' pr.json)

        if [[ -z "$HEAD_REF" || -z "$HEAD_REPO" || -z "$BASE_REPO" || -z "$AUTHOR_ID" || "$HEAD_REF" == "null" || "$HEAD_REPO" == "null" || "$BASE_REPO" == "null" || "$AUTHOR_ID" == "null" ]]; then
          echo "::error::Failed to parse PR URL: $PR_URL"
          exit 1
        fi

        echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
        echo "head_repo_full_name=$HEAD_REPO" >> "$GITHUB_OUTPUT"
        echo "base_repo_full_name=$BASE_REPO" >> "$GITHUB_OUTPUT"
        echo "author_id=$AUTHOR_ID" >> "$GITHUB_OUTPUT"

    - name: Check PR Author
      id: check_author
      shell: bash
      env:
        PR_AUTHOR_ID: ${{ steps.parse_pr.outputs.author_id }}
        ALLOWED_USER_IDS: ${{ inputs.user_ids }}
      run: |
        echo "PR Author ID: $PR_AUTHOR_ID"
        echo "Allowed User IDs: $ALLOWED_USER_IDS"

        match=false
        # Replace commas with spaces to handle mixed delimiters
        # Then iterate over the space-separated list
        for id in ${ALLOWED_USER_IDS//,/ }; do
          if [[ "$id" == "$PR_AUTHOR_ID" ]]; then
            match=true
            break
          fi
        done

        if [[ "$match" != "true" ]]; then
          echo "PR author ID '$PR_AUTHOR_ID' is not in the allowed list. Skipping."
          echo "match=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "match=true" >> "$GITHUB_OUTPUT"

    - name: Check Branch Pattern
      id: check_branch
      if: ${{ steps.check_author.outputs.match == 'true' }}
      uses: TimSchoenle/actions/actions/helper/verify-branch-name@942adbf1569777c9a9ef84f002ffd3c11736ee37 # actions-helper-verify-branch-name-v1.1.1
      with:
        branch_pattern: ${{ inputs.branch_pattern }}
        reject_forks: ${{ inputs.reject_forks }}
        error_on_failure: 'false'
        head_repo_full_name: ${{ steps.parse_pr.outputs.head_repo_full_name }}
        base_repo_full_name: ${{ steps.parse_pr.outputs.base_repo_full_name }}
        head_ref: ${{ steps.parse_pr.outputs.head_ref }}

    - name: Check Changes
      id: check_changes
      if: ${{ steps.check_branch.outputs.verified == 'true' }}
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_URL: ${{ inputs.pr_url }}
        IGNORE_ZERO_CHANGES: ${{ inputs.ignore_empty_prs }}
      run: |
        if [[ "$IGNORE_ZERO_CHANGES" != "true" ]]; then
          echo "Skipping check for 0 changes."
          echo "match=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Get the number of changed files
        changed_files=$(gh pr view "$PR_URL" --json files --jq '.files | length')
        echo "Changed files: $changed_files"

        if [[ "$changed_files" -eq 0 ]]; then
          echo "PR has 0 changed files. Ignoring."
          echo "match=false" >> "$GITHUB_OUTPUT"
        else
          echo "PR has changes. Proceeding."
          echo "match=true" >> "$GITHUB_OUTPUT"
        fi
      shell: bash

    - name: Verify Commits and Signatures
      id: verify_commits
      if: steps.check_changes.outputs.match == 'true'
      uses: TimSchoenle/actions/actions/helper/verify-commit-authors@6a924e58dacbfe89586619e968a79c5eb84c87fe # actions-helper-verify-commit-authors-v1.1.14
      with:
        pr_url: ${{ inputs.pr_url }}
        github_token: ${{ inputs.token }}
        user_ids: ${{ inputs.user_ids }}

    - name: Determine if PR should be auto-approved
      id: is_valid_pr
      shell: bash
      env:
        IS_VALID_AUTHOR: ${{ steps.check_author.outputs.match }}
        IS_VALID_BRANCH: ${{ steps.check_branch.outputs.verified }}
        HAS_VALID_COMMITS: ${{ steps.verify_commits.outputs.verified }}
        HAS_CHANGES: ${{ steps.check_changes.outputs.match }}
      run: |
        echo "Is valid author: $IS_VALID_AUTHOR"
        echo "Is valid branch: $IS_VALID_BRANCH"
        echo "Has valid commits: $HAS_VALID_COMMITS"
        echo "Has changes: $HAS_CHANGES"

        if [[ "$IS_VALID_AUTHOR" == "true" && "$IS_VALID_BRANCH" == "true" && "$HAS_VALID_COMMITS" == "true" && "$HAS_CHANGES" == "true" ]]; then
          echo "match=true" >> "$GITHUB_OUTPUT"
        else
          echo "match=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Auto-approve
      shell: bash
      if: steps.is_valid_pr.outputs.match == 'true'
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_URL: ${{ inputs.pr_url }}
        AUTO_APPROVE_MESSAGE: ${{ inputs.auto_approve_message }}
      run: |
        echo "All checks passed. Approving PR..."
        if ! gh pr review "$PR_URL" --approve --body "$AUTO_APPROVE_MESSAGE"; then
          echo "::error::Failed to approve PR at $PR_URL"
          exit 1
        fi
