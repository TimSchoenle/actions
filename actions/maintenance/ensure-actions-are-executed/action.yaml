name: 'Maintenance Ensure-actions-are-executed'
description: 'Ensures selected checks completed successfully when they were started.'

inputs:
  token:
    description: 'GitHub token with checks:read permission.'
    required: true
  checks:
    description: 'List of checks to verify. One pattern per line.'
    required: true
  match_mode:
    description: 'How to interpret each check matcher: exact, regex, or auto (/regex/ => regex, otherwise exact).'
    required: false
    default: 'auto'
  repository:
    description: 'Repository to inspect in owner/repo format.'
    required: false
    default: ${{ github.repository }}
  ref:
    description: 'Git reference (usually SHA) to inspect.'
    required: false
    default: ${{ github.event.pull_request.head.sha || github.sha }}
  error_on_failure:
    description: 'Whether to fail this action if matched checks failed verification.'
    required: false
    default: 'true'

outputs:
  matched_checks_count:
    description: 'How many unique checks matched at least one matcher.'
  failed_checks_count:
    description: 'How many matched checks failed verification.'

runs:
  using: 'node20'
  main: 'dist/index.js'
