name: 'Maintenance Ensure-actions-are-executed'
description: 'Ensures selected checks completed successfully when they were started.'

inputs:
  token:
    description: 'GitHub token with checks:read permission.'
    required: true
  checks:
    description: 'List of checks to verify. One pattern per line.'
    required: true
  match_mode:
    description: 'How to interpret each check matcher: exact, regex, or auto (/regex/ => regex, otherwise exact).'
    required: false
    default: 'auto'
  repository:
    description: 'Repository to inspect in owner/repo format.'
    required: false
    default: ${{ github.repository }}
  ref:
    description: 'Git reference (usually SHA) to inspect.'
    required: false
    default: ${{ github.sha }}

outputs:
  matched_checks_count:
    description: 'How many unique checks matched at least one matcher.'
    value: ${{ steps.verify.outputs.matched_checks_count }}
  failed_checks_count:
    description: 'How many matched checks failed verification.'
    value: ${{ steps.verify.outputs.failed_checks_count }}

runs:
  using: 'composite'
  steps:
    - name: Prepare Inputs
      id: prepare
      shell: bash
      env:
        INPUT_CHECKS: ${{ inputs.checks }}
        INPUT_MATCH_MODE: ${{ inputs.match_mode }}
      run: |
        set -euo pipefail

        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::jq is required but not available."
          exit 1
        fi

        if ! command -v gh >/dev/null 2>&1; then
          echo "::error::gh CLI is required but not available."
          exit 1
        fi

        if [[ "$INPUT_MATCH_MODE" != "auto" && "$INPUT_MATCH_MODE" != "exact" && "$INPUT_MATCH_MODE" != "regex" ]]; then
          echo "::error::Invalid match_mode '$INPUT_MATCH_MODE'. Allowed values: auto, exact, regex."
          exit 1
        fi

        # Normalize matcher list by splitting newlines and commas, trimming whitespace, and removing empties.
        normalized_check_lines="$(
          printf '%s\n' "$INPUT_CHECKS" \
            | tr ',' '\n' \
            | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//' \
            | sed '/^$/d'
        )"

        if [[ -z "$normalized_check_lines" ]]; then
          echo "::error::No checks configured. Provide at least one matcher in 'checks'."
          exit 1
        fi

        temp_dir="${RUNNER_TEMP}/ensure-actions-are-executed"
        mkdir -p "$temp_dir"
        matcher_file="${temp_dir}/matchers.txt"
        printf '%s\n' "$normalized_check_lines" > "$matcher_file"

        echo "temp_dir=$temp_dir" >> "$GITHUB_OUTPUT"
        echo "matcher_file=$matcher_file" >> "$GITHUB_OUTPUT"

    - name: Fetch Check Runs
      id: fetch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_REF: ${{ inputs.ref }}
        TEMP_DIR: ${{ steps.prepare.outputs.temp_dir }}
      run: |
        set -euo pipefail

        all_check_runs='[]'
        page=1
        while true; do
          response="$(gh api "/repos/$INPUT_REPOSITORY/commits/$INPUT_REF/check-runs?per_page=100&page=$page")"
          page_check_runs="$(printf '%s' "$response" | jq '.check_runs')"
          count="$(printf '%s' "$page_check_runs" | jq 'length')"

          all_check_runs="$(jq -cn --argjson a "$all_check_runs" --argjson b "$page_check_runs" '$a + $b')"

          if [[ "$count" -lt 100 ]]; then
            break
          fi
          page=$((page + 1))
        done

        latest_check_runs_file="${TEMP_DIR}/latest-check-runs.json"
        available_names_file="${TEMP_DIR}/available-check-names.txt"

        latest_check_runs="$(
          printf '%s' "$all_check_runs" \
            | jq 'sort_by(.id) | group_by(.name) | map(.[-1])'
        )"
        printf '%s' "$latest_check_runs" > "$latest_check_runs_file"
        printf '%s' "$latest_check_runs" | jq -r '.[].name' > "$available_names_file"

        available_count="$(wc -l < "$available_names_file" | tr -d ' ')"
        echo "latest_check_runs_file=$latest_check_runs_file" >> "$GITHUB_OUTPUT"
        echo "available_names_file=$available_names_file" >> "$GITHUB_OUTPUT"
        echo "available_count=$available_count" >> "$GITHUB_OUTPUT"

    - name: Match Check Patterns
      id: match
      shell: bash
      env:
        INPUT_MATCH_MODE: ${{ inputs.match_mode }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_REF: ${{ inputs.ref }}
        MATCHER_FILE: ${{ steps.prepare.outputs.matcher_file }}
        AVAILABLE_NAMES_FILE: ${{ steps.fetch.outputs.available_names_file }}
        TEMP_DIR: ${{ steps.prepare.outputs.temp_dir }}
      run: |
        set -euo pipefail

        selected_checks_file="${TEMP_DIR}/selected-checks.txt"
        : > "$selected_checks_file"

        mapfile -t available_names < "$AVAILABLE_NAMES_FILE"
        if [[ "${#available_names[@]}" -eq 0 ]]; then
          echo "::notice::No check runs found for $INPUT_REPOSITORY at ref $INPUT_REF."
          echo "selected_checks_file=$selected_checks_file" >> "$GITHUB_OUTPUT"
          echo "matched_checks_count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        declare -A selected_checks=()
        declare -A selected_by_pattern=()

        while IFS= read -r raw_matcher || [[ -n "$raw_matcher" ]]; do
          matcher="$raw_matcher"
          mode="$INPUT_MATCH_MODE"
          if [[ "$mode" == "auto" ]]; then
            if [[ "$matcher" =~ ^/.+/$ ]]; then
              mode="regex"
              matcher="${matcher:1:${#matcher}-2}"
            else
              mode="exact"
            fi
          fi

          if [[ "$mode" == "regex" ]]; then
            if ! [[ "" =~ $matcher ]] 2>/dev/null; then
              echo "::error::Invalid regex matcher '$raw_matcher'."
              exit 1
            fi
          fi

          matched_in_pattern=0
          for check_name in "${available_names[@]}"; do
            is_match=0
            if [[ "$mode" == "exact" ]]; then
              if [[ "$check_name" == "$matcher" ]]; then
                is_match=1
              fi
            else
              if [[ "$check_name" =~ $matcher ]]; then
                is_match=1
              fi
            fi

            if [[ "$is_match" -eq 1 ]]; then
              selected_checks["$check_name"]=1
              matched_in_pattern=$((matched_in_pattern + 1))
            fi
          done

          selected_by_pattern["$raw_matcher"]="$matched_in_pattern"
        done < "$MATCHER_FILE"

        for matcher in "${!selected_by_pattern[@]}"; do
          if [[ "${selected_by_pattern[$matcher]}" -eq 0 ]]; then
            echo "::notice::Matcher '$matcher' did not match any check run. This is treated as not started."
          else
            echo "::notice::Matcher '$matcher' matched ${selected_by_pattern[$matcher]} check run(s)."
          fi
        done

        matched_checks_count="${#selected_checks[@]}"
        if [[ "$matched_checks_count" -gt 0 ]]; then
          printf '%s\n' "${!selected_checks[@]}" | sort > "$selected_checks_file"
        fi

        echo "selected_checks_file=$selected_checks_file" >> "$GITHUB_OUTPUT"
        echo "matched_checks_count=$matched_checks_count" >> "$GITHUB_OUTPUT"

    - name: Verify Matched Checks
      id: verify
      shell: bash
      env:
        LATEST_CHECK_RUNS_FILE: ${{ steps.fetch.outputs.latest_check_runs_file }}
        SELECTED_CHECKS_FILE: ${{ steps.match.outputs.selected_checks_file }}
        MATCHED_CHECKS_COUNT: ${{ steps.match.outputs.matched_checks_count }}
      run: |
        set -euo pipefail

        failed_checks_count=0
        if [[ "${MATCHED_CHECKS_COUNT:-0}" -eq 0 ]]; then
          echo "matched_checks_count=0" >> "$GITHUB_OUTPUT"
          echo "failed_checks_count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        while IFS= read -r check_name || [[ -n "$check_name" ]]; do
          status="$(
            jq -r --arg name "$check_name" '.[] | select(.name == $name) | .status' "$LATEST_CHECK_RUNS_FILE"
          )"
          conclusion="$(
            jq -r --arg name "$check_name" '.[] | select(.name == $name) | .conclusion // "null"' "$LATEST_CHECK_RUNS_FILE"
          )"
          details_url="$(
            jq -r --arg name "$check_name" '.[] | select(.name == $name) | .details_url' "$LATEST_CHECK_RUNS_FILE"
          )"

          # Skipped checks are considered "not started" for conditional workflows/jobs.
          if [[ "$status" == "completed" && "$conclusion" == "skipped" ]]; then
            echo "::notice::Check '$check_name' was skipped and is ignored."
            continue
          fi

          if [[ "$status" != "completed" ]]; then
            echo "::error::Check '$check_name' started but is not completed (status=$status). $details_url"
            failed_checks_count=$((failed_checks_count + 1))
            continue
          fi

          if [[ "$conclusion" != "success" ]]; then
            echo "::error::Check '$check_name' started but did not succeed (conclusion=$conclusion). $details_url"
            failed_checks_count=$((failed_checks_count + 1))
            continue
          fi

          echo "::notice::Check '$check_name' completed successfully."
        done < "$SELECTED_CHECKS_FILE"

        echo "matched_checks_count=${MATCHED_CHECKS_COUNT:-0}" >> "$GITHUB_OUTPUT"
        echo "failed_checks_count=$failed_checks_count" >> "$GITHUB_OUTPUT"

        if [[ "$failed_checks_count" -gt 0 ]]; then
          exit 1
        fi
