name: 'Maintenance Auto-rebase'
description: 'Automatically rebases open PRs with a given label.'

on:
  workflow_call:
    inputs:
      label:
        description: 'The label to look for on PRs to rebase.'
        required: true
        type: string
    secrets:
      app_id:
        description: 'GitHub App ID with permissions to write contents and pull requests.'
        required: true
      private_key:
        description: 'GitHub App Private Key'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-auto-rebase
  cancel-in-progress: true

permissions: {}

jobs:
  detect_prs:
    name: Detect PRs to Rebase
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Generate Token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.private_key }}
          permission-pull-requests: read

      - name: Detect PRs
        id: detect
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          LABEL: ${{ inputs.label }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const { LABEL } = process.env;
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const prNumbers = pulls
              .filter(pr => pr.labels.some(l => l.name === LABEL))
              .map(pr => pr.number);

            console.log(`Found PRs with label '${LABEL}':`, prNumbers);

            if (prNumbers.length === 0) {
              core.notice(`No open PRs found with label '${LABEL}'.`);
            }

            // Output as JSON array string
            core.setOutput('matrix', JSON.stringify(prNumbers));

  rebase_prs:
    name: Rebase PRs
    needs: detect_prs
    if: ${{ needs.detect_prs.outputs.matrix != '[]' && needs.detect_prs.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJSON(needs.detect_prs.outputs.matrix) }}
    steps:
      - name: Generate Token
        id: generate-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.private_key }}
          permission-pull-requests: write
          permission-contents: write

      - name: Rebase PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ matrix.pr }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const { PR_NUMBER } = process.env;

            // Get the PR to verify it's still open
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: PR_NUMBER
            });

            console.log(`Checking PR #${PR_NUMBER} (state: ${pr.state})`);

            if (pr.state !== 'open') {
               console.log(`PR #${PR_NUMBER} is not open, skipping.`);
               return;
            }

            try {
              const result = await github.rest.pulls.updateBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: PR_NUMBER,
                // Passing the expected_head_sha is recommended to avoid race conditions
                expected_head_sha: pr.head.sha
              });
              console.log(`Successfully requested branch update for PR #${PR_NUMBER}.`, result.data);
            } catch (error) {
              console.error(`Failed to update branch for PR #${PR_NUMBER}:`, error.message);
              core.warning(`Could not update PR #${PR_NUMBER}: ${error.message} - it might already be up to date or have conflicts.`);
            }
