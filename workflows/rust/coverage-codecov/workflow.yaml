name: 'Rust Coverage (Codecov)'
description: 'Reusable workflow that runs cargo llvm-cov to generate code coverage and uploads to Codecov.'

on:
  workflow_call:
    inputs:
      source_directory:
        description: 'Directory containing the Rust project'
        required: false
        type: string
        default: '.'
      test_arguments:
        description: 'Additional arguments to pass to cargo nextest'
        required: false
        type: string
        default: '--all-features --workspace'
    secrets:
      codecov_token:
        description: 'Token for Codecov'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-rust-coverage
  cancel-in-progress: true

permissions: {}

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout the code
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1.15.3

      - name: Install cargo-llvm-cov and nextest
        uses: taiki-e/install-action@b18b9d93a43496aeda12369e7563d9251abc2fe1 # v2.68.24
        with:
          tool: cargo-llvm-cov,nextest

      - name: Generate code coverage
        env:
          TEST_ARGUMENTS: ${{ inputs.test_arguments }}
        working-directory: ${{ inputs.source_directory }}
        run: |
          # shellcheck disable=SC2206
          args=($TEST_ARGUMENTS)
          cargo llvm-cov nextest --lcov --output-path lcov.info "${args[@]}"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.codecov_token }}
          files: lcov.info
          fail_ci_if_error: true
