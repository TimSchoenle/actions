name: 'Rust Coverage (Codecov)'
description: 'Reusable workflow that runs cargo llvm-cov to generate code coverage and uploads to Codecov.'

on:
  workflow_call:
    inputs:
      source_directory:
        description: 'Directory containing the Rust project'
        required: false
        type: string
        default: '.'
      test_arguments:
        description: 'Additional arguments to pass to cargo nextest'
        required: false
        type: string
        default: '--all-features --workspace'
    secrets:
      codecov_token:
        description: 'Token for Codecov'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-rust-coverage
  cancel-in-progress: true

permissions: {}

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout the code
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Install cargo-llvm-cov and nextest
        uses: taiki-e/install-action@7627fb428e65e78e2ec9a24ae5c5bd5f8553f182 # v2.69.10
        with:
          tool: cargo-llvm-cov,nextest

      - name: Generate code coverage
        env:
          TEST_ARGUMENTS: ${{ inputs.test_arguments }}
        working-directory: ${{ inputs.source_directory }}
        run: |
          # shellcheck disable=SC2206
          args=($TEST_ARGUMENTS)
          cargo llvm-cov nextest --lcov --output-path lcov.info "${args[@]}"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          token: ${{ secrets.codecov_token }}
          files: lcov.info
          fail_ci_if_error: true
