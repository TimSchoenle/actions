name: Verify Maintenance Ensure-actions-are-executed

on:
  push:
    branches:
      - main
    paths:
      - 'actions/maintenance/ensure-actions-are-executed/**'
      - '.github/workflows/verify-action-maintenance-ensure-actions-are-executed.yaml'
  pull_request:
    paths:
      - 'actions/maintenance/ensure-actions-are-executed/**'
      - '.github/workflows/verify-action-maintenance-ensure-actions-are-executed.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  successful-check:
    name: Verify fixture success
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fixture step
        run: echo "Success fixture"

  skipped-check:
    name: Verify fixture skipped
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Should never run
        run: echo "This should be skipped"

  verify:
    name: Verify Ensure-actions-are-executed
    if: ${{ always() }}
    needs:
      - successful-check
      - skipped-check
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      checks: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Strict mode should fail
        id: strict_mode
        continue-on-error: true
        uses: ./actions/maintenance/ensure-actions-are-executed
        with:
          token: ${{ github.token }}
          ref: ${{ github.sha }}
          checks: |
            Verify fixture success
            /^Verify fixture skipped$/
            /^Verify Ensure-actions-are-executed$/
          error_on_failure: 'true'

      - name: Assert strict mode failed
        shell: bash
        env:
          STRICT_OUTCOME: ${{ steps.strict_mode.outcome }}
          STRICT_FAILED: ${{ steps.strict_mode.outputs.failed_checks_count }}
        run: |
          set -euo pipefail

          echo "Strict outcome: $STRICT_OUTCOME"
          echo "Strict failed count: ${STRICT_FAILED:-unset}"

          if [[ "$STRICT_OUTCOME" != "failure" ]]; then
            echo "::error::Strict mode was expected to fail but outcome was '$STRICT_OUTCOME'."
            exit 1
          fi

          if [[ "${STRICT_FAILED:-0}" -lt 1 ]]; then
            echo "::error::Strict mode failed, but failed_checks_count was '${STRICT_FAILED:-0}'."
            exit 1
          fi

      - name: Lenient mode should continue
        id: lenient_mode
        uses: ./actions/maintenance/ensure-actions-are-executed
        with:
          token: ${{ github.token }}
          ref: ${{ github.sha }}
          checks: |
            Verify fixture success
            /^Verify fixture skipped$/
            /^Verify Ensure-actions-are-executed$/
          error_on_failure: 'false'

      - name: Assert lenient mode reported failures without failing
        shell: bash
        env:
          LENIENT_OUTCOME: ${{ steps.lenient_mode.outcome }}
          LENIENT_FAILED: ${{ steps.lenient_mode.outputs.failed_checks_count }}
          LENIENT_MATCHED: ${{ steps.lenient_mode.outputs.matched_checks_count }}
        run: |
          set -euo pipefail

          echo "Lenient outcome: $LENIENT_OUTCOME"
          echo "Lenient matched count: ${LENIENT_MATCHED:-unset}"
          echo "Lenient failed count: ${LENIENT_FAILED:-unset}"

          if [[ "$LENIENT_OUTCOME" != "success" ]]; then
            echo "::error::Lenient mode should have succeeded, but outcome was '$LENIENT_OUTCOME'."
            exit 1
          fi

          if [[ "${LENIENT_FAILED:-0}" -lt 1 ]]; then
            echo "::error::Lenient mode should report at least one failed check."
            exit 1
          fi

          if [[ "${LENIENT_MATCHED:-0}" -lt 2 ]]; then
            echo "::error::Expected at least two matched checks (success + failure)."
            exit 1
          fi
