name: Verify Helper Verify-commit-authors

on:
  push:
    branches:
      - main
    paths:
      - 'actions/helper/verify-commit-authors/**'
      - '.github/workflows/verify-action-helper-verify-commit-authors.yaml'
  pull_request:
    paths:
      - 'actions/helper/verify-commit-authors/**'
      - '.github/workflows/verify-action-helper-verify-commit-authors.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify:
    name: Verify Verify-commit-authors
    # The positive case verifies the commits of the pull request that triggered this run.
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # to fetch code
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Fetch Current PR Authors
        id: fetch-authors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "Fetching authors for PR: $PR_URL"

          # shellcheck disable=SC2016
          QUERY='
            query($url: URI!) {
              resource(url: $url) {
                ... on PullRequest {
                  commits(last: 100) {
                    nodes {
                      commit {
                        authors(first: 10) {
                          nodes {
                            user {
                              databaseId
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          '

          # Extract all unique author IDs into a comma-separated string
          AUTHORS=$(gh api graphql -F url="$PR_URL" -f query="$QUERY" | jq -r '
            [
              .data.resource.commits.nodes[].commit.authors.nodes[].user.databaseId
            ] | unique | join(",")
          ')

          echo "Found Authors: $AUTHORS"
          echo "authors=$AUTHORS" >> "$GITHUB_OUTPUT"

      - name: Test verify-commit-authors (Positive - Should Pass)
        id: test-positive
        uses: ./actions/helper/verify-commit-authors
        with:
          pr_url: ${{ github.event.pull_request.html_url }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_ids: ${{ steps.fetch-authors.outputs.authors }}

      - name: Assert Positive Result
        env:
          VERIFIED: ${{ steps.test-positive.outputs.verified }}
          INVALID_COMMITS: ${{ steps.test-positive.outputs.invalid_commits }}
        run: |
          if [ "$VERIFIED" != "true" ]; then
            echo "::error::Positive test failed! Expected verified=true, got '$VERIFIED'"
            echo "Invalid commits: $INVALID_COMMITS"
            exit 1
          fi

          if [ -n "$INVALID_COMMITS" ]; then
            echo "::error::A verified PR must not report invalid commits, got '$INVALID_COMMITS'"
            exit 1
          fi

          echo "✅ All commits of this PR are authored by the expected users and signed"

      - name: Test verify-commit-authors (Negative - Should Fail)
        id: test-negative
        uses: ./actions/helper/verify-commit-authors
        with:
          pr_url: ${{ github.event.pull_request.html_url }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_ids: 1 # Dummy ID

      - name: Assert Negative Result
        env:
          VERIFIED: ${{ steps.test-negative.outputs.verified }}
          INVALID_COMMITS: ${{ steps.test-negative.outputs.invalid_commits }}
        run: |
          if [ "$VERIFIED" != "false" ]; then
            echo "::error::Negative test failed! Expected verified=false, got '$VERIFIED'"
            exit 1
          fi

          # Every commit of this PR was authored by someone other than user ID 1, so every commit
          # must be listed as invalid.
          if [ -z "$INVALID_COMMITS" ]; then
            echo "::error::Expected the rejected commits to be listed on the invalid_commits output"
            exit 1
          fi

          echo "✅ Rejected commits reported: $(echo "$INVALID_COMMITS" | wc -l) commit(s)"

  verify-input-validation:
    name: Test Input Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read # to fetch code
    strategy:
      fail-fast: false
      matrix:
        include:
          # A malformed ID must fail the step: coercing it to NaN would silently report the pull
          # request as unverified, which is indistinguishable from a genuine rejection.
          - name: 'Non-numeric user ID'
            pr_url: 'https://github.com/TimSchoenle/actions/pull/1'
            user_ids: 'not-an-id'

          - name: 'One malformed ID among valid ones'
            pr_url: 'https://github.com/TimSchoenle/actions/pull/1'
            user_ids: '29139614, oops'

          - name: 'Empty user ID list'
            pr_url: 'https://github.com/TimSchoenle/actions/pull/1'
            user_ids: ' , '

          # A URL that is not a pull request cannot be verified.
          - name: 'URL is not a pull request'
            pr_url: 'https://github.com/TimSchoenle/actions'
            user_ids: '29139614'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Run Test (${{ matrix.name }})
        id: test
        continue-on-error: true
        uses: ./actions/helper/verify-commit-authors
        with:
          pr_url: ${{ matrix.pr_url }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_ids: ${{ matrix.user_ids }}

      - name: Assert Failure
        env:
          TEST_NAME: ${{ matrix.name }}
          OUTCOME: ${{ steps.test.outcome }}
          VERIFIED: ${{ steps.test.outputs.verified }}
        run: |
          echo "Test: $TEST_NAME"

          if [ "$OUTCOME" != "failure" ]; then
            echo "::error::Expected the action to fail, but the outcome was '$OUTCOME'"
            exit 1
          fi

          if [ -n "$VERIFIED" ]; then
            echo "::error::A failed run must not publish a verification verdict, got verified='$VERIFIED'"
            exit 1
          fi

          echo "✅ Action failed as expected without publishing a verdict"

  # <<< generated: summary (run 'bun run generate-ci-required' to update)
  summary:
    name: 'CI Summary: Helper Verify-commit-authors'
    if: ${{ always() }}
    needs:
      - verify
      - verify-input-validation
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Fail if any verify job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
  # >>> generated: summary
