name: Post Publish Docs

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.id }}
  cancel-in-progress: true

permissions: {}

jobs:
  update-docs:
    name: Update README and SECURITY
    if: github.event.release.target_commitish == 'main'
    environment:
      name: ci
      deployment: false
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Generate Bot Token
        id: generate_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.ACTIONS_MAINTENANCE_APP_ID }}
          private-key: ${{ secrets.ACTIONS_MAINTENANCE_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: Refresh Tags
        run: git fetch --force --tags origin

      - name: Setup Bun
        uses: TimSchoenle/actions/actions/bun/setup-cached@3d01a1101b3c6f5a53ddff0b99cddac4932b7c17 # tag=actions-bun-setup-cached-v1.1.7

      - name: Generate Docs
        run: bun run generate-docs

      - name: Commit and Push if changed
        uses: TimSchoenle/actions/actions/common/commit-changes@8f15b94f827ea2005c0e32cadc86bb50969633dd # tag=actions-common-commit-changes-v1.1.4
        with:
          commit_message: 'docs: auto-update documentation post-release'
          file_pattern: 'README.md SECURITY.md'
          token: ${{ steps.generate_token.outputs.token }}
