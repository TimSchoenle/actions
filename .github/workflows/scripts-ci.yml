name: Scripts CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint-and-test:
    name: Lint & Test
    permissions:
      contents: read # to fetch code
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: TimSchoenle/actions/actions/bun/setup-cached@fba42f3b3c460cdeb05f7fe0e49ab949dc6c37a9 # tag=actions-bun-setup-cached-v1.1.8

      - name: Format Check
        run: bun run format --check

      - name: Test
        run: bun run test
