name: Scripts CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint-and-test:
    name: Lint & Test
    permissions:
      contents: read # to fetch code
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # The bundle check below compares committed bytes against a fresh build, so the Bun that builds
      # here must be the Bun that built what was committed. An empty bun-version makes setup-bun fall
      # through to bun-version-file; setup-cached defaults it to 'latest', which would win otherwise.
      - name: Setup Bun
        uses: TimSchoenle/actions/actions/bun/setup-cached@cbdcf6fd08b46059064bc9c91efa6b610a9ee7db # tag=actions-bun-setup-cached-v1.1.10
        with:
          bun-version: ''
          bun-version-file: '.bun-version'

      - name: Format Check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      # Must run before the typecheck, which regenerates the sources in place: this step is what
      # proves the committed sources still match their action.yaml.
      - name: Check Generated Action Sources
        run: bun run check-action-sources

      # GitHub runs the committed bundle at runs.main, not these sources. Without this step a pull
      # request that changes an action but does not rebuild its bundle passes every other check while
      # shipping code that matches no source tree.
      - name: Check Action Bundles
        run: bun run check-action-dist

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
