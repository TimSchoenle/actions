name: CI Required

# Single aggregate gate for the path-filtered verify-action-* workflows.
#
# Each verify-action-* workflow is filtered with `on.pull_request.paths`, so it
# only runs when its own action changes. That makes the individual verify jobs
# unusable as *required* status checks: a PR that does not touch a given action
# never produces that check, and a required-but-missing check blocks the PR
# forever ("Expected — waiting for status to be reported").
#
# This workflow publishes one `ci-required` commit status that summarizes every
# verify check that actually ran on the PR head. Only `ci-required` needs to be
# marked required in branch protection. It evaluates:
#   * once per PR (baseline, so PRs that trigger no verify workflow still report), and
#   * again each time a watched verify workflow completes (authoritative result).
#
# The underlying ensure-actions-are-executed action treats a check that never
# started as "not a failure", so path-filtered-out workflows do not wedge the
# gate, while a check that started but did not succeed fails it.

on:
  pull_request:
  workflow_run: # zizmor: ignore[dangerous-triggers] -- This workflow only reads completed verify workflow results and publishes an aggregate commit status for the same head SHA.
    # GENERATED — do not edit by hand. Run `bun run generate-ci-required` to
    # rebuild this list from the verify-action-*.yaml workflows on disk. The
    # ci-required drift test fails CI if it is out of sync.
    # <<< generated: verify-workflows
    workflows:
      - Verify Action Common Modify YAML
      - Verify Action Common Read YAML
      - Verify Bun Setup Cached
      - Verify Common Close Pull Request
      - Verify Common Commit Changes
      - Verify Common Create Pull Request
      - Verify Common Create-branch
      - Verify Common Delete-branch
      - Verify Common Get App Git Identity
      - Verify Common Setup App Git Identity
      - Verify Helm Update Chart Version
      - Verify Helper Resolve-base-branch
      - Verify Helper Verify-branch-name
      - Verify Helper Verify-commit-authors
      - Verify Java-gradle Auto-spotless
      - Verify Java-gradle Setup-base-environment
      - Verify Maintenance Auto-approve-pr
      - Verify Maintenance Ensure-actions-are-executed
      - Verify Test Setup-e2e
    # >>> generated: verify-workflows
    types:
      - completed

concurrency:
  # Collapse the pull_request baseline and every workflow_run firing for the same
  # head commit so only the most recent evaluation posts the final status.
  group: ci-required-${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  gate:
    name: Aggregate verify checks
    runs-on: ubuntu-latest
    permissions:
      actions: read # ensure-actions-are-executed workflow-jobs fallback
      checks: read # read the verify check run states
      contents: read # query the repository
      statuses: write # publish the ci-required commit status
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Resolve target commit
        id: target
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          sha="${WORKFLOW_RUN_SHA:-$PR_SHA}"
          if [[ -z "$sha" ]]; then
            echo "::error::Could not resolve a target commit SHA."
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Aggregate verify checks
        id: verify
        uses: TimSchoenle/actions/actions/maintenance/ensure-actions-are-executed@c5cbec3b61b8792a3c9a4d6b2a8010dcc3ee4549 # tag=actions-maintenance-ensure-actions-are-executed-v1.1.1
        with:
          token: ${{ github.token }}
          ref: ${{ steps.target.outputs.sha }}
          # Each verify-action-* workflow exposes exactly one `CI Summary: <name>`
          # check via its summary job, so this single stable pattern covers every
          # current and future verify workflow without edits here.
          checks: |
            /^CI Summary:/
          error_on_failure: 'false'

      - name: Publish ci-required status
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.target.outputs.sha }}
          EVENT: ${{ github.event_name }}
          MATCHED: ${{ steps.verify.outputs.matched_checks_count }}
          FAILED: ${{ steps.verify.outputs.failed_checks_count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          matched="${MATCHED:-0}"
          failed="${FAILED:-0}"

          if [[ "$EVENT" == "workflow_run" && "$matched" -eq 0 ]]; then
            # A watched verify workflow just finished, so at least one matching
            # check must exist at $SHA. Zero matches means the ref or the check
            # patterns are misconfigured: fail loudly instead of silently green.
            state="failure"
            description="No verify checks found at ${SHA:0:7}; check ref/patterns."
          elif [[ "$failed" -gt 0 ]]; then
            state="failure"
            description="${failed} verify check(s) not in the expected state."
          else
            state="success"
            description="All ${matched} verify check(s) passed."
          fi

          echo "::notice::ci-required=${state} for ${SHA} (${description})"

          gh api -X POST "repos/${REPO}/statuses/${SHA}" \
            -f state="${state}" \
            -f context="ci-required" \
            -f description="${description}" \
            -f target_url="${RUN_URL}" >/dev/null

          if [[ "$state" != "success" ]]; then
            exit 1
          fi
