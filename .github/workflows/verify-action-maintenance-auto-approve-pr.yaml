name: Verify Maintenance Auto-approve-pr

on:
  push:
    branches:
      - main
    paths:
      - 'actions/maintenance/auto-approve-pr/**'
      - '.github/workflows/verify-action-maintenance-auto-approve-pr.yaml'
  pull_request:
    paths:
      - 'actions/maintenance/auto-approve-pr/**'
      - '.github/workflows/verify-action-maintenance-auto-approve-pr.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # to read content

env:
  TEST_OWNER: TimSchoenle
  TEST_REPO_NAME: actions-testing
  TEST_REPO: TimSchoenle/actions-testing
  TEST_ID: auto-approve-pr-test-${{ github.run_number }}-${{ github.run_attempt }}

jobs:
  test-auto-approve-positive:
    environment:
      name: ci-e2e
      deployment: false
    name: Test Auto-approve (Allowed User)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Generate PR Approval Bot Token
        id: generate_token2
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.ACTIONS_TEST_BOT2_APP_ID }}
          private-key: ${{ secrets.ACTIONS_TEST_BOT2_PRIVATE_KEY }}
          owner: ${{ env.TEST_OWNER }}
          repositories: ${{ env.TEST_REPO_NAME }}
          permission-pull-requests: write

      - name: Setup E2E Test Environment
        id: setup
        uses: TimSchoenle/actions/actions/test/setup-e2e@672acb2c734f080b887f92668c9feba714c2dd31 # tag=actions-test-setup-e2e-v1.2.0
        with:
          app_id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private_key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          test_owner: ${{ env.TEST_OWNER }}
          test_repo: ${{ env.TEST_REPO }}
          test_repo_name: ${{ env.TEST_REPO_NAME }}
          current_repo_checkout_path: 'tmp/actions-code'

      - name: Get Bot User ID
        id: bot_identity
        uses: TimSchoenle/actions/actions/common/get-app-git-identity@26754381479003bd81b51fffecc97f1faa20a9bf # tag=actions-common-get-app-git-identity-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          app-slug: ${{ steps.setup.outputs.app_slug }}

      - name: Create Test Branch
        id: branch
        uses: TimSchoenle/actions/actions/common/create-branch@331de547737ea4a2b899287998f1ff90a912b7ba # tag=actions-common-create-branch-v1.2.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: test/auto-approve/positive/${{ env.TEST_ID }}
          reset_branch: 'true'

      - name: Create Test File
        shell: bash
        run: |
          echo "# Test file for auto-approve-pr" > test-file.txt
          echo "Created at: $(date)" >> test-file.txt

      - name: Create Pull Request (with commit)
        id: pr
        uses: TimSchoenle/actions/actions/common/create-pull-request@56a357475cab7e427e977544641726519b87c268 # tag=actions-common-create-pull-request-v1.0.4
        with:
          app-id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private-key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch.outputs.branch }}
          base_branch: main
          title: 'Test PR for auto-approve (positive) - ${{ env.TEST_ID }}'
          body: 'This is a test PR created by the verify workflow to test auto-approve-pr action.'
          commit_changes: 'true'
          commit_message: 'test: add test file for auto-approve (${{ env.TEST_ID }})'
          file_pattern: '.'

      - name: Run Auto-approve Action (Should Approve)
        id: auto_approve
        uses: ./tmp/actions-code/actions/maintenance/auto-approve-pr
        with:
          token: ${{ steps.generate_token2.outputs.token }}
          pr_url: ${{ steps.pr.outputs.pr_url }}
          user_ids: ${{ steps.bot_identity.outputs.bot-id }}
          branch_pattern: '.*'
          ignore_empty_prs: 'true'

      - name: Verify PR Was Approved
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          TEST_REPO: ${{ env.TEST_REPO }}
        run: |
          set -euo pipefail

          # Get PR reviews
          REVIEWS=$(gh api "/repos/$TEST_REPO/pulls/$PR_NUMBER/reviews" --jq '.[].state')

          if ! echo "$REVIEWS" | grep -q "APPROVED"; then
            echo "::error::PR was not approved as expected"
            echo "Reviews: $REVIEWS"
            exit 1
          fi

          echo "✅ PR was successfully auto-approved"

      - name: Cleanup - Close Pull Request
        if: always()
        uses: TimSchoenle/actions/actions/common/close-pull-request@d553418def5cd5ba91cf4997752b3e2053fec978 # tag=actions-common-close-pull-request-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          pull_request_id: ${{ steps.pr.outputs.pr_number }}

      - name: Cleanup - Delete Branch
        if: always()
        uses: TimSchoenle/actions/actions/common/delete-branch@8001f0d144c85586ba753315fb37a5c8237cfa99 # tag=actions-common-delete-branch-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch.outputs.branch }}

  test-auto-approve-negative:
    environment:
      name: ci-e2e
      deployment: false
    name: Test Auto-approve (Non-allowed User)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Generate PR Approval Bot Token
        id: generate_token2
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.ACTIONS_TEST_BOT2_APP_ID }}
          private-key: ${{ secrets.ACTIONS_TEST_BOT2_PRIVATE_KEY }}
          owner: ${{ env.TEST_OWNER }}
          repositories: ${{ env.TEST_REPO_NAME }}
          permission-pull-requests: write

      - name: Setup E2E Test Environment
        id: setup
        uses: TimSchoenle/actions/actions/test/setup-e2e@672acb2c734f080b887f92668c9feba714c2dd31 # tag=actions-test-setup-e2e-v1.2.0
        with:
          app_id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private_key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          test_owner: ${{ env.TEST_OWNER }}
          test_repo: ${{ env.TEST_REPO }}
          test_repo_name: ${{ env.TEST_REPO_NAME }}
          current_repo_checkout_path: 'tmp/actions-code'

      - name: Create Test Branch
        id: branch
        uses: TimSchoenle/actions/actions/common/create-branch@331de547737ea4a2b899287998f1ff90a912b7ba # tag=actions-common-create-branch-v1.2.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: test/auto-approve/negative/${{ env.TEST_ID }}
          reset_branch: 'true'

      - name: Create Test File
        shell: bash
        run: |
          echo "# Test file for auto-approve-pr (negative)" > test-file-negative.txt
          echo "Created at: $(date)" >> test-file-negative.txt

      - name: Create Pull Request (with commit)
        id: pr
        uses: TimSchoenle/actions/actions/common/create-pull-request@56a357475cab7e427e977544641726519b87c268 # tag=actions-common-create-pull-request-v1.0.4
        with:
          app-id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private-key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch.outputs.branch }}
          base_branch: main
          title: 'Test PR for auto-approve (negative) - ${{ env.TEST_ID }}'
          body: 'This is a test PR created by the verify workflow to test auto-approve-pr action with non-allowed user.'
          commit_changes: 'true'
          commit_message: 'test: add test file for auto-approve negative case (${{ env.TEST_ID }})'
          file_pattern: '.'

      - name: Run Auto-approve Action (Should Not Approve)
        id: auto_approve
        uses: ./tmp/actions-code/actions/maintenance/auto-approve-pr
        with:
          token: ${{ steps.generate_token2.outputs.token }}
          pr_url: ${{ steps.pr.outputs.pr_url }}
          user_ids: '12345' # Dummy user ID that won't match
          branch_pattern: '.*'
          ignore_empty_prs: 'true'

      - name: Verify PR Was Not Approved
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          TEST_REPO: ${{ env.TEST_REPO }}
        run: |
          set -euo pipefail

          # Get PR reviews
          REVIEWS=$(gh api "/repos/$TEST_REPO/pulls/$PR_NUMBER/reviews" --jq '.[].state' || echo "")

          if echo "$REVIEWS" | grep -q "APPROVED"; then
            echo "::error::PR was approved but should not have been"
            echo "Reviews: $REVIEWS"
            exit 1
          fi

          echo "✅ PR was correctly not approved"

      - name: Cleanup - Close Pull Request
        if: always()
        uses: TimSchoenle/actions/actions/common/close-pull-request@d553418def5cd5ba91cf4997752b3e2053fec978 # tag=actions-common-close-pull-request-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          pull_request_id: ${{ steps.pr.outputs.pr_number }}

      - name: Cleanup - Delete Branch
        if: always()
        uses: TimSchoenle/actions/actions/common/delete-branch@8001f0d144c85586ba753315fb37a5c8237cfa99 # tag=actions-common-delete-branch-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch.outputs.branch }}

  test-branch-pattern-matching:
    environment:
      name: ci-e2e
      deployment: false
    name: Test Branch Pattern Matching
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Generate PR Approval Bot Token
        id: generate_token2
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.ACTIONS_TEST_BOT2_APP_ID }}
          private-key: ${{ secrets.ACTIONS_TEST_BOT2_PRIVATE_KEY }}
          owner: ${{ env.TEST_OWNER }}
          repositories: ${{ env.TEST_REPO_NAME }}
          permission-pull-requests: write

      - name: Setup E2E Test Environment
        id: setup
        uses: TimSchoenle/actions/actions/test/setup-e2e@672acb2c734f080b887f92668c9feba714c2dd31 # tag=actions-test-setup-e2e-v1.2.0
        with:
          app_id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private_key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          test_owner: ${{ env.TEST_OWNER }}
          test_repo: ${{ env.TEST_REPO }}
          test_repo_name: ${{ env.TEST_REPO_NAME }}
          current_repo_checkout_path: 'tmp/actions-code'

      - name: Get Bot User ID
        id: bot_identity
        uses: TimSchoenle/actions/actions/common/get-app-git-identity@26754381479003bd81b51fffecc97f1faa20a9bf # tag=actions-common-get-app-git-identity-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          app-slug: ${{ steps.setup.outputs.app_slug }}

      - name: Create Test Branch (Matching Pattern)
        id: branch_match
        uses: TimSchoenle/actions/actions/common/create-branch@331de547737ea4a2b899287998f1ff90a912b7ba # tag=actions-common-create-branch-v1.2.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: release-please--branches--main/${{ env.TEST_ID }}
          reset_branch: 'true'

      - name: Create Test File (Matching)
        shell: bash
        run: |
          echo "# Test file for branch pattern (matching)" > test-branch-match.txt

      - name: Create Pull Request (Matching Pattern with commit)
        id: pr_match
        uses: TimSchoenle/actions/actions/common/create-pull-request@56a357475cab7e427e977544641726519b87c268 # tag=actions-common-create-pull-request-v1.0.4
        with:
          app-id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private-key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch_match.outputs.branch }}
          base_branch: main
          title: 'Test PR for branch pattern (matching) - ${{ env.TEST_ID }}'
          body: 'Test PR with branch that matches the pattern.'
          commit_changes: 'true'
          commit_message: 'test: branch pattern matching test (${{ env.TEST_ID }})'
          file_pattern: '.'

      - name: Run Auto-approve Action (Should Approve - Pattern Match)
        uses: ./tmp/actions-code/actions/maintenance/auto-approve-pr
        with:
          token: ${{ steps.generate_token2.outputs.token }}
          pr_url: ${{ steps.pr_match.outputs.pr_url }}
          user_ids: ${{ steps.bot_identity.outputs.bot-id }}
          branch_pattern: '^release-please--branches--.*$'
          ignore_empty_prs: 'true'

      - name: Verify PR Was Approved (Pattern Match)
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          PR_NUMBER: ${{ steps.pr_match.outputs.pr_number }}
          TEST_REPO: ${{ env.TEST_REPO }}
        run: |
          set -euo pipefail

          # Get PR reviews
          REVIEWS=$(gh api "/repos/$TEST_REPO/pulls/$PR_NUMBER/reviews" --jq '.[].state')

          if ! echo "$REVIEWS" | grep -q "APPROVED"; then
            echo "::error::PR with matching branch pattern was not approved"
            echo "Reviews: $REVIEWS"
            exit 1
          fi

          echo "✅ PR with matching branch pattern was approved"

      - name: Create Test Branch (Non-matching Pattern)
        id: branch_nomatch
        uses: TimSchoenle/actions/actions/common/create-branch@331de547737ea4a2b899287998f1ff90a912b7ba # tag=actions-common-create-branch-v1.2.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: feature/test-branch/${{ env.TEST_ID }}
          reset_branch: 'true'

      - name: Create Test File (Non-matching)
        shell: bash
        run: |
          echo "# Test file for branch pattern (non-matching)" > test-branch-nomatch.txt

      - name: Create Pull Request (Non-matching Pattern with commit)
        id: pr_nomatch
        uses: TimSchoenle/actions/actions/common/create-pull-request@56a357475cab7e427e977544641726519b87c268 # tag=actions-common-create-pull-request-v1.0.4
        with:
          app-id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private-key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch_nomatch.outputs.branch }}
          base_branch: main
          title: 'Test PR for branch pattern (non-matching) - ${{ env.TEST_ID }}'
          body: 'Test PR with branch that does not match the pattern.'
          commit_changes: 'true'
          commit_message: 'test: branch pattern non-matching test (${{ env.TEST_ID }})'
          file_pattern: '.'

      - name: Run Auto-approve Action (Should Not Approve - Pattern Mismatch)
        uses: ./tmp/actions-code/actions/maintenance/auto-approve-pr
        with:
          token: ${{ steps.generate_token2.outputs.token }}
          pr_url: ${{ steps.pr_nomatch.outputs.pr_url }}
          user_ids: ${{ steps.bot_identity.outputs.bot-id }}
          branch_pattern: '^release-please--branches--.*$'
          ignore_empty_prs: 'true'

      - name: Verify PR Was Not Approved (Pattern Mismatch)
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          PR_NUMBER: ${{ steps.pr_nomatch.outputs.pr_number }}
          TEST_REPO: ${{ env.TEST_REPO }}
        run: |
          set -euo pipefail

          # Get PR reviews
          REVIEWS=$(gh api "/repos/$TEST_REPO/pulls/$PR_NUMBER/reviews" --jq '.[].state' || echo "")

          if echo "$REVIEWS" | grep -q "APPROVED"; then
            echo "::error::PR with non-matching branch pattern was approved but should not have been"
            echo "Reviews: $REVIEWS"
            exit 1
          fi

          echo "✅ PR with non-matching branch pattern was correctly not approved"

      - name: Cleanup - Close Pull Request (Match)
        if: always()
        uses: TimSchoenle/actions/actions/common/close-pull-request@d553418def5cd5ba91cf4997752b3e2053fec978 # tag=actions-common-close-pull-request-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          pull_request_id: ${{ steps.pr_match.outputs.pr_number }}

      - name: Cleanup - Delete Branch (Match)
        if: always()
        uses: TimSchoenle/actions/actions/common/delete-branch@8001f0d144c85586ba753315fb37a5c8237cfa99 # tag=actions-common-delete-branch-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch_match.outputs.branch }}

      - name: Cleanup - Close Pull Request (No Match)
        if: always()
        uses: TimSchoenle/actions/actions/common/close-pull-request@d553418def5cd5ba91cf4997752b3e2053fec978 # tag=actions-common-close-pull-request-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          pull_request_id: ${{ steps.pr_nomatch.outputs.pr_number }}

      - name: Cleanup - Delete Branch (No Match)
        if: always()
        uses: TimSchoenle/actions/actions/common/delete-branch@8001f0d144c85586ba753315fb37a5c8237cfa99 # tag=actions-common-delete-branch-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch_nomatch.outputs.branch }}

  test-reject-forks:
    environment:
      name: ci-e2e
      deployment: false
    name: Test Reject Forks Setting
    runs-on: ubuntu-latest
    # Note: This test verifies the reject_forks parameter is processed correctly
    # but cannot test actual fork rejection since E2E tests create PRs in the same repo
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Generate PR Approval Bot Token
        id: generate_token2
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.ACTIONS_TEST_BOT2_APP_ID }}
          private-key: ${{ secrets.ACTIONS_TEST_BOT2_PRIVATE_KEY }}
          owner: ${{ env.TEST_OWNER }}
          repositories: ${{ env.TEST_REPO_NAME }}
          permission-pull-requests: write

      - name: Setup E2E Test Environment
        id: setup
        uses: TimSchoenle/actions/actions/test/setup-e2e@672acb2c734f080b887f92668c9feba714c2dd31 # tag=actions-test-setup-e2e-v1.2.0
        with:
          app_id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private_key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          test_owner: ${{ env.TEST_OWNER }}
          test_repo: ${{ env.TEST_REPO }}
          test_repo_name: ${{ env.TEST_REPO_NAME }}
          current_repo_checkout_path: 'tmp/actions-code'

      - name: Get Bot User ID
        id: bot_identity
        uses: TimSchoenle/actions/actions/common/get-app-git-identity@26754381479003bd81b51fffecc97f1faa20a9bf # tag=actions-common-get-app-git-identity-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          app-slug: ${{ steps.setup.outputs.app_slug }}

      - name: Create Test Branch
        id: branch
        uses: TimSchoenle/actions/actions/common/create-branch@331de547737ea4a2b899287998f1ff90a912b7ba # tag=actions-common-create-branch-v1.2.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: release-please--branches--test-fork/${{ env.TEST_ID }}
          reset_branch: 'true'

      - name: Create Test File
        shell: bash
        run: |
          echo "# Test file for reject_forks parameter" > test-reject-forks.txt

      - name: Create Pull Request (with commit)
        id: pr
        uses: TimSchoenle/actions/actions/common/create-pull-request@56a357475cab7e427e977544641726519b87c268 # tag=actions-common-create-pull-request-v1.0.4
        with:
          app-id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private-key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch.outputs.branch }}
          base_branch: main
          title: 'Test PR for reject_forks - ${{ env.TEST_ID }}'
          body: 'Test PR to verify reject_forks parameter processing (same-repo PR, should approve).'
          commit_changes: 'true'
          commit_message: 'test: reject_forks parameter test (${{ env.TEST_ID }})'
          file_pattern: '.'

      - name: Run Auto-approve with reject_forks=true (Should Still Approve Same-Repo PR)
        uses: ./tmp/actions-code/actions/maintenance/auto-approve-pr
        with:
          token: ${{ steps.generate_token2.outputs.token }}
          pr_url: ${{ steps.pr.outputs.pr_url }}
          user_ids: ${{ steps.bot_identity.outputs.bot-id }}
          branch_pattern: '^release-please--branches--.*$'
          reject_forks: 'true'
          ignore_empty_prs: 'true'

      - name: Verify Same-Repo PR Was Approved (Even with reject_forks=true)
        env:
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          TEST_REPO: ${{ env.TEST_REPO }}
        run: |
          set -euo pipefail

          # Get PR reviews
          REVIEWS=$(gh api "/repos/$TEST_REPO/pulls/$PR_NUMBER/reviews" --jq '.[].state')

          if ! echo "$REVIEWS" | grep -q "APPROVED"; then
            echo "::error::Same-repo PR was not approved (reject_forks=true should only reject forks)"
            echo "Reviews: $REVIEWS"
            exit 1
          fi

          echo "✅ Same-repo PR was correctly approved with reject_forks=true"

      - name: Cleanup - Close Pull Request
        if: always()
        uses: TimSchoenle/actions/actions/common/close-pull-request@d553418def5cd5ba91cf4997752b3e2053fec978 # tag=actions-common-close-pull-request-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          pull_request_id: ${{ steps.pr.outputs.pr_number }}

      - name: Cleanup - Delete Branch
        if: always()
        uses: TimSchoenle/actions/actions/common/delete-branch@8001f0d144c85586ba753315fb37a5c8237cfa99 # tag=actions-common-delete-branch-v1.1.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch.outputs.branch }}
