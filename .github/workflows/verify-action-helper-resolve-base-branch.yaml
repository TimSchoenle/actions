name: Verify Helper Resolve-base-branch

on:
  push:
    branches:
      - main
    paths:
      - 'actions/helper/resolve-base-branch/**'
      - '.github/workflows/verify-action-helper-resolve-base-branch.yaml'
  pull_request:
    paths:
      - 'actions/helper/resolve-base-branch/**'
      - '.github/workflows/verify-action-helper-resolve-base-branch.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  TEST_OWNER: TimSchoenle
  TEST_REPO_NAME: actions-testing
  TEST_REPO: TimSchoenle/actions-testing
  TEST_ID: resolve-base-branch-test-${{ github.run_number }}-${{ github.run_attempt }}
  TEST_REPO_BASE_BRANCH_NAME: main

jobs:
  verify-base-branch:
    environment:
      name: ci-e2e
      deployment: false
    name: Verify Resolve-base-branch
    runs-on: ubuntu-latest
    permissions:
      contents: read # to fetch code
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Setup E2E Test Environment
        id: setup
        uses: TimSchoenle/actions/actions/test/setup-e2e@9aabf0be4b0008aa5bdc479b556851c3a5c54d93 # tag=actions-test-setup-e2e-v1.2.2
        with:
          app_id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private_key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          test_owner: ${{ env.TEST_OWNER }}
          test_repo: ${{ env.TEST_REPO }}
          test_repo_name: ${{ env.TEST_REPO_NAME }}
          current_repo_checkout_path: 'tmp/actions-code'

      - name: Test resolve-base-branch
        id: resolve-base-branch
        uses: ./tmp/actions-code/actions/helper/resolve-base-branch
        with:
          repository: ${{ env.TEST_REPO }}
          token: ${{ steps.setup.outputs.token }}

      - name: Verify Base Branch Name
        shell: bash
        env:
          BASE_BRANCH_NAME: ${{ steps.resolve-base-branch.outputs.base_branch }}
          EXPECTED_BASE_BRANCH_NAME: ${{ env.TEST_REPO_BASE_BRANCH_NAME }}
        run: |
          # Verify base branch name
          if [ "$BASE_BRANCH_NAME" != "$EXPECTED_BASE_BRANCH_NAME" ]; then
            echo "::error::Base branch name ($BASE_BRANCH_NAME) does not match default ($EXPECTED_BASE_BRANCH_NAME)"
            exit 1
          fi
          echo "✅ Verified base branch name matches"

  verify-existing-branch:
    environment:
      name: ci-e2e
      deployment: false
    name: Verify none base branch resolver
    runs-on: ubuntu-latest
    permissions:
      contents: read # to fetch code
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Setup E2E Test Environment
        id: setup
        uses: TimSchoenle/actions/actions/test/setup-e2e@9aabf0be4b0008aa5bdc479b556851c3a5c54d93 # tag=actions-test-setup-e2e-v1.2.2
        with:
          app_id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private_key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          test_owner: ${{ env.TEST_OWNER }}
          test_repo: ${{ env.TEST_REPO }}
          test_repo_name: ${{ env.TEST_REPO_NAME }}
          current_repo_checkout_path: 'tmp/actions-code'

      - name: Create Test Branch
        id: branch
        uses: TimSchoenle/actions/actions/common/create-branch@8d270f6641807f495868e7b34ae287a91c7cdd2e # tag=actions-common-create-branch-v1.3.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: test/resolve-base-branch-exists/${{ env.TEST_ID }}
          reset_branch: 'true'

      - name: Test resolve-base-branch
        id: resolve-base-branch
        uses: ./tmp/actions-code/actions/helper/resolve-base-branch
        with:
          repository: ${{ env.TEST_REPO }}
          token: ${{ steps.setup.outputs.token }}
          branch_name: ${{ steps.branch.outputs.branch }}

      - name: Verify Base Branch Name
        shell: bash
        env:
          BASE_BRANCH_NAME: ${{ steps.resolve-base-branch.outputs.base_branch }}
          EXPECTED_BASE_BRANCH_NAME: ${{ steps.branch.outputs.branch }}
        run: |
          # Verify base branch name
          if [ "$BASE_BRANCH_NAME" != "$EXPECTED_BASE_BRANCH_NAME" ]; then
            echo "::error::Base branch name ($BASE_BRANCH_NAME) does not match default ($EXPECTED_BASE_BRANCH_NAME)"
            exit 1
          fi
          echo "✅ Verified base branch name matches"

      - name: Cleanup Branch
        if: always()
        uses: TimSchoenle/actions/actions/common/delete-branch@c2e2da7da23b58ef96b025edf218c8d17e3b9073 # tag=actions-common-delete-branch-v1.2.0
        with:
          token: ${{ steps.setup.outputs.token }}
          repository: ${{ env.TEST_REPO }}
          branch_name: ${{ steps.branch.outputs.branch }}

  verify-none-existing-branch-with-verify:
    environment:
      name: ci-e2e
      deployment: false
    name: Verify none existing branch resolver
    runs-on: ubuntu-latest
    permissions:
      contents: read # to fetch code
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Setup E2E Test Environment
        id: setup
        uses: TimSchoenle/actions/actions/test/setup-e2e@9aabf0be4b0008aa5bdc479b556851c3a5c54d93 # tag=actions-test-setup-e2e-v1.2.2
        with:
          app_id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private_key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          test_owner: ${{ env.TEST_OWNER }}
          test_repo: ${{ env.TEST_REPO }}
          test_repo_name: ${{ env.TEST_REPO_NAME }}
          current_repo_checkout_path: 'tmp/actions-code'

      - name: Test resolve-base-branch
        id: resolve-base-branch
        uses: ./tmp/actions-code/actions/helper/resolve-base-branch
        with:
          repository: ${{ env.TEST_REPO }}
          token: ${{ steps.setup.outputs.token }}
          branch_name: test/resolve-base-branch-does-not-exist/${{ env.TEST_ID }}
          silent_fail: true

      - name: Verify Action Failure
        shell: bash
        env:
          BASE_BRANCH_NAME: ${{ steps.resolve-base-branch.outputs.base_branch }}
        run: |
          if [ -n "$BASE_BRANCH_NAME" ]; then
            echo "::error::Base branch name ($BASE_BRANCH_NAME) should be empty"
            exit 1
          fi

  verify-none-existing-branch-without-verify:
    environment:
      name: ci-e2e
      deployment: false
    name: Verify none existing branch resolver without verify
    runs-on: ubuntu-latest
    permissions:
      contents: read # to fetch code
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Setup E2E Test Environment
        id: setup
        uses: TimSchoenle/actions/actions/test/setup-e2e@9aabf0be4b0008aa5bdc479b556851c3a5c54d93 # tag=actions-test-setup-e2e-v1.2.2
        with:
          app_id: ${{ secrets.ACTIONS_TEST_BOT_APP_ID }}
          private_key: ${{ secrets.ACTIONS_TEST_BOT_PRIVATE_KEY }}
          test_owner: ${{ env.TEST_OWNER }}
          test_repo: ${{ env.TEST_REPO }}
          test_repo_name: ${{ env.TEST_REPO_NAME }}
          current_repo_checkout_path: 'tmp/actions-code'

      - name: Test resolve-base-branch
        id: resolve-base-branch
        uses: ./tmp/actions-code/actions/helper/resolve-base-branch
        with:
          repository: ${{ env.TEST_REPO }}
          token: ${{ steps.setup.outputs.token }}
          branch_name: test/resolve-base-branch-does-not-exist-without-verify/${{ env.TEST_ID }}
          check_if_exist: false

      - name: Verify Base Branch Name
        shell: bash
        env:
          BASE_BRANCH_NAME: ${{ steps.resolve-base-branch.outputs.base_branch }}
          EXPECTED_BASE_BRANCH_NAME: test/resolve-base-branch-does-not-exist-without-verify/${{ env.TEST_ID }}
        run: |
          # Verify base branch name
          if [ "$BASE_BRANCH_NAME" != "$EXPECTED_BASE_BRANCH_NAME" ]; then
            echo "::error::Base branch name ($BASE_BRANCH_NAME) does not match default ($EXPECTED_BASE_BRANCH_NAME)"
            exit 1
          fi
          echo "✅ Verified base branch name matches"

  verify-input-validation:
    name: Verify input validation
    runs-on: ubuntu-latest
    permissions:
      contents: read # to fetch code
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'Repository without an owner'
            repository: 'actions-testing'
            branch_name: ''
            check_if_exist: 'true'
            silent_fail: 'false'

          - name: 'Repository with a trailing path'
            repository: 'TimSchoenle/actions/extra'
            branch_name: ''
            check_if_exist: 'true'
            silent_fail: 'false'

          - name: 'Invalid check_if_exist value'
            repository: 'TimSchoenle/actions'
            branch_name: 'main'
            check_if_exist: 'maybe'
            silent_fail: 'false'

          - name: 'Invalid silent_fail value'
            repository: 'TimSchoenle/actions'
            branch_name: 'main'
            check_if_exist: 'true'
            silent_fail: ''

          # silent_fail covers a missing branch — never a broken token. An unusable token must fail
          # loudly instead of being reported as "branch does not exist".
          - name: 'Invalid token is never silenced by silent_fail'
            repository: 'TimSchoenle/actions'
            branch_name: 'main'
            check_if_exist: 'true'
            silent_fail: 'true'
            token: 'ghp_0000000000000000000000000000000000000000'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run Test (${{ matrix.name }})
        id: resolve
        continue-on-error: true
        uses: ./actions/helper/resolve-base-branch
        with:
          token: ${{ matrix.token || secrets.GITHUB_TOKEN }}
          repository: ${{ matrix.repository }}
          branch_name: ${{ matrix.branch_name }}
          check_if_exist: ${{ matrix.check_if_exist }}
          silent_fail: ${{ matrix.silent_fail }}

      - name: Assert Failure
        env:
          TEST_NAME: ${{ matrix.name }}
          OUTCOME: ${{ steps.resolve.outcome }}
          BASE_BRANCH: ${{ steps.resolve.outputs.base_branch }}
        run: |
          echo "Test: $TEST_NAME"

          if [ "$OUTCOME" != "failure" ]; then
            echo "::error::Expected the action to fail, but the outcome was '$OUTCOME'"
            exit 1
          fi

          if [ -n "$BASE_BRANCH" ]; then
            echo "::error::A failed run must not emit a base branch, but it emitted '$BASE_BRANCH'"
            exit 1
          fi

          echo "✅ Action failed as expected"

  # <<< generated: summary (run 'bun run generate-ci-required' to update)
  summary:
    name: 'CI Summary: Helper Resolve-base-branch'
    if: ${{ always() }}
    needs:
      - verify-base-branch
      - verify-existing-branch
      - verify-none-existing-branch-with-verify
      - verify-none-existing-branch-without-verify
      - verify-input-validation
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Fail if any verify job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
  # >>> generated: summary
