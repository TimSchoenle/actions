name: Auto Format
description: 'Reusable workflow to auto-format code using Bun (Prettier) and commit changes.'

on:
  workflow_call:
    inputs:
      format_command:
        description: 'Script name to run via "bun run"'
        required: false
        type: string
        default: 'format'
      commit_message:
        description: 'Commit message for auto-formatted changes'
        required: false
        type: string
        default: 'style: auto-format code'
      workflow_files_permission:
        description: 'Grant the bot write permission to workflow files (.github/workflows)'
        required: false
        type: boolean
        default: true
      pr_comment:
        description: 'Comment to post on the Pull Request'
        required: false
        type: string
        default: '🎨 Code has been auto-formatted to adhere to the style guide.'
    secrets:
      APP_ID:
        required: true
        description: 'GitHub App ID for bot authentication'
      PRIVATE_KEY:
        required: true
        description: 'GitHub App Private Key (Requires permissions: contents:write, pull-requests:write, workflows:write)'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-auto-bun-prettier
  cancel-in-progress: true

permissions: {}

jobs:
  auto-format:
    name: Auto Format
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Generate Bot Token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: ${{ inputs.workflow_files_permission && 'write' || 'none' }} # To allow updating formatted action files

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Bun
        uses: TimSchoenle/actions/actions/bun/setup-cached@cbdcf6fd08b46059064bc9c91efa6b610a9ee7db # tag=actions-bun-setup-cached-v1.1.10

      - name: Format
        env:
          FORMAT_COMMAND: ${{ inputs.format_command }}
        run: bun run "$FORMAT_COMMAND"

      - name: Commit and Push if changed
        id: auto-commit
        uses: TimSchoenle/actions/actions/common/commit-changes@5373ad973e0bf692b19771bf68f201237a7ad1f1 # tag=actions-common-commit-changes-v1.2.0
        with:
          commit_message: ${{ inputs.commit_message }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Comment on PR
        if: steps.auto-commit.outputs.changes_detected == 'true' && github.event_name == 'pull_request' && inputs.pr_comment != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const { PR_COMMENT } = process.env
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: PR_COMMENT
            })
        env:
          PR_COMMENT: ${{ inputs.pr_comment }}
