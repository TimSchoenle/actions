name: Verify Helper Verify-branch-name

on:
  push:
    branches:
      - main
    paths:
      - 'actions/helper/verify-branch-name/**'
      - '.github/workflows/verify-action-helper-verify-branch-name.yaml'
  pull_request:
    paths:
      - 'actions/helper/verify-branch-name/**'
      - '.github/workflows/verify-action-helper-verify-branch-name.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify-branch-pattern:
    name: Test Branch Patterns
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Simple prefix patterns
          - name: 'Feature branch with prefix pattern'
            branch_pattern: '^feature/.*'
            head_ref: 'feature/add-new-feature'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Feature branch with escaped prefix pattern'
            branch_pattern: '^feature\/.*'
            head_ref: 'feature/add-new-feature'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Feature branch pattern mismatch'
            branch_pattern: '^feature/.*'
            head_ref: 'bugfix/fix-something'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'false'
            expected_branch_verified: 'false'
            expected_fork_verified: 'true'

          - name: 'Bugfix branch with prefix pattern'
            branch_pattern: '^(bugfix|hotfix)/.*'
            head_ref: 'bugfix/critical-fix'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Hotfix branch with prefix pattern'
            branch_pattern: '^(bugfix|hotfix)/.*'
            head_ref: 'hotfix/urgent-fix'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          # Release-please patterns
          - name: 'Release-please branch pattern match'
            branch_pattern: '^release-please--branches--.*$'
            head_ref: 'release-please--branches--main'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Release-please branch pattern mismatch'
            branch_pattern: '^release-please--branches--.*$'
            head_ref: 'release-please-main'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'false'
            expected_branch_verified: 'false'
            expected_fork_verified: 'true'

          # Semantic versioning patterns
          - name: 'Semantic version pattern v1.2.3'
            branch_pattern: '^v[0-9]+\.[0-9]+\.[0-9]+$'
            head_ref: 'v1.2.3'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Semantic version pattern mismatch'
            branch_pattern: '^v[0-9]+\.[0-9]+\.[0-9]+$'
            head_ref: 'v1.2'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'false'
            expected_branch_verified: 'false'
            expected_fork_verified: 'true'

          # Special characters in branch names
          - name: 'Branch with underscores'
            branch_pattern: '^feature/[a-z_-]+$'
            head_ref: 'feature/my_feature_name'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Branch with dashes'
            branch_pattern: '^feature/[a-z_-]+$'
            head_ref: 'feature/my-feature-name'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Branch with numbers'
            branch_pattern: '^feature/[a-z0-9-]+$'
            head_ref: 'feature/issue-123'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Branch with issue number pattern'
            branch_pattern: '^(feature|bugfix)/issue-[0-9]+$'
            head_ref: 'feature/issue-456'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          # Case sensitivity tests
          - name: 'Case sensitive match (lowercase)'
            branch_pattern: '^feature/.*'
            head_ref: 'feature/test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Case sensitive mismatch (uppercase)'
            branch_pattern: '^feature/.*'
            head_ref: 'Feature/test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'false'
            expected_branch_verified: 'false'
            expected_fork_verified: 'true'

          # Complex patterns
          - name: 'Multiple alternatives with slashes'
            branch_pattern: '^(feature|bugfix|hotfix|chore)/.*'
            head_ref: 'chore/update-deps'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Pattern with dots and slashes'
            branch_pattern: '^release/v[0-9]+\.[0-9]+\.[0-9]+$'
            head_ref: 'release/v2.5.1'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Pattern with optional suffix'
            branch_pattern: '^main(-[a-z]+)?$'
            head_ref: 'main-staging'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Pattern matching main without suffix'
            branch_pattern: '^main(-[a-z]+)?$'
            head_ref: 'main'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          # Edge cases
          - name: 'No pattern provided (auto-pass)'
            branch_pattern: ''
            head_ref: 'any-branch-name'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Branch with forward slashes'
            branch_pattern: '^users/[a-z]+/feature/.*'
            head_ref: 'users/john/feature/new-thing'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Exact branch name match'
            branch_pattern: '^main$'
            head_ref: 'main'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Exact branch name mismatch'
            branch_pattern: '^main$'
            head_ref: 'main-dev'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            expected_verified: 'false'
            expected_branch_verified: 'false'
            expected_fork_verified: 'true'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Test (${{ matrix.name }})
        id: test
        uses: ./actions/helper/verify-branch-name
        with:
          branch_pattern: ${{ matrix.branch_pattern }}
          head_ref: ${{ matrix.head_ref }}
          head_repo_full_name: ${{ matrix.head_repo }}
          base_repo_full_name: ${{ matrix.base_repo }}
          reject_forks: ${{ matrix.reject_forks }}
          error_on_failure: ${{ matrix.error_on_failure }}

      - name: Assert Outputs
        env:
          TEST_NAME: ${{ matrix.name }}
          VERIFIED: ${{ steps.test.outputs.verified }}
          BRANCH_VERIFIED: ${{ steps.test.outputs.branch_pattern_verified }}
          FORK_VERIFIED: ${{ steps.test.outputs.fork_verified }}
          EXPECTED_VERIFIED: ${{ matrix.expected_verified }}
          EXPECTED_BRANCH_VERIFIED: ${{ matrix.expected_branch_verified }}
          EXPECTED_FORK_VERIFIED: ${{ matrix.expected_fork_verified }}
        run: |
          echo "Test: $TEST_NAME"
          echo "Outputs:"
          echo "  verified: $VERIFIED (expected: $EXPECTED_VERIFIED)"
          echo "  branch_pattern_verified: $BRANCH_VERIFIED (expected: $EXPECTED_BRANCH_VERIFIED)"
          echo "  fork_verified: $FORK_VERIFIED (expected: $EXPECTED_FORK_VERIFIED)"

          FAILED=0

          if [ "$VERIFIED" != "$EXPECTED_VERIFIED" ]; then
            echo "::error::verified output mismatch! Got '$VERIFIED', expected '$EXPECTED_VERIFIED'"
            FAILED=1
          fi

          if [ "$BRANCH_VERIFIED" != "$EXPECTED_BRANCH_VERIFIED" ]; then
            echo "::error::branch_pattern_verified output mismatch! Got '$BRANCH_VERIFIED', expected '$EXPECTED_BRANCH_VERIFIED'"
            FAILED=1
          fi

          if [ "$FORK_VERIFIED" != "$EXPECTED_FORK_VERIFIED" ]; then
            echo "::error::fork_verified output mismatch! Got '$FORK_VERIFIED', expected '$EXPECTED_FORK_VERIFIED'"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

          echo "✅ All outputs match expected values"

  verify-fork-detection:
    name: Test Fork Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Fork tests with reject_forks=true
          - name: 'Same repo with reject_forks=true'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            expected_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Fork with reject_forks=true'
            head_repo: 'forker/repo'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            expected_verified: 'false'
            expected_fork_verified: 'false'

          # Fork tests with reject_forks=false
          - name: 'Same repo with reject_forks=false'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            expected_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Fork with reject_forks=false'
            head_repo: 'forker/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            expected_verified: 'true'
            expected_fork_verified: 'true'

          # Edge cases with repository names
          - name: 'Repos with similar names (same owner)'
            head_repo: 'owner/repo-fork'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            expected_verified: 'false'
            expected_fork_verified: 'false'

          - name: 'Repos with similar names (different owner)'
            head_repo: 'owner2/repo'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            expected_verified: 'false'
            expected_fork_verified: 'false'

          - name: 'Case sensitive repo names'
            head_repo: 'Owner/Repo'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            expected_verified: 'false'
            expected_fork_verified: 'false'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Test (${{ matrix.name }})
        id: test
        uses: ./actions/helper/verify-branch-name
        with:
          head_ref: 'test-branch'
          head_repo_full_name: ${{ matrix.head_repo }}
          base_repo_full_name: ${{ matrix.base_repo }}
          reject_forks: ${{ matrix.reject_forks }}
          error_on_failure: 'false'
          branch_pattern: '.*'

      - name: Assert Outputs
        env:
          TEST_NAME: ${{ matrix.name }}
          VERIFIED: ${{ steps.test.outputs.verified }}
          FORK_VERIFIED: ${{ steps.test.outputs.fork_verified }}
          EXPECTED_VERIFIED: ${{ matrix.expected_verified }}
          EXPECTED_FORK_VERIFIED: ${{ matrix.expected_fork_verified }}
        run: |
          echo "Test: $TEST_NAME"
          echo "Outputs:"
          echo "  verified: $VERIFIED (expected: $EXPECTED_VERIFIED)"
          echo "  fork_verified: $FORK_VERIFIED (expected: $EXPECTED_FORK_VERIFIED)"

          FAILED=0

          if [ "$VERIFIED" != "$EXPECTED_VERIFIED" ]; then
            echo "::error::verified output mismatch! Got '$VERIFIED', expected '$EXPECTED_VERIFIED'"
            FAILED=1
          fi

          if [ "$FORK_VERIFIED" != "$EXPECTED_FORK_VERIFIED" ]; then
            echo "::error::fork_verified output mismatch! Got '$FORK_VERIFIED', expected '$EXPECTED_FORK_VERIFIED'"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

          echo "✅ All outputs match expected values"

  verify-error-handling:
    name: Test Error Handling
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # error_on_failure tests
          - name: 'error_on_failure=false with all passing'
            branch_pattern: '^feature/.*'
            head_ref: 'feature/test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            should_fail: false
            expected_verified: 'true'

          - name: 'error_on_failure=false with branch mismatch'
            branch_pattern: '^feature/.*'
            head_ref: 'bugfix/test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'false'
            should_fail: false
            expected_verified: 'false'

          - name: 'error_on_failure=false with fork rejection'
            branch_pattern: '^feature/.*'
            head_ref: 'feature/test'
            head_repo: 'forker/repo'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            error_on_failure: 'false'
            should_fail: false
            expected_verified: 'false'

          - name: 'error_on_failure=true with all passing'
            branch_pattern: '^feature/.*'
            head_ref: 'feature/test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'true'
            should_fail: false
            expected_verified: 'true'

          - name: 'error_on_failure=true with failure (should exit 1)'
            branch_pattern: '^feature/.*'
            head_ref: 'bugfix/test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            error_on_failure: 'true'
            should_fail: true
            expected_verified: 'false'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Test (${{ matrix.name }})
        id: test
        continue-on-error: ${{ matrix.should_fail }}
        uses: ./actions/helper/verify-branch-name
        with:
          branch_pattern: ${{ matrix.branch_pattern }}
          head_ref: ${{ matrix.head_ref }}
          head_repo_full_name: ${{ matrix.head_repo }}
          base_repo_full_name: ${{ matrix.base_repo }}
          reject_forks: ${{ matrix.reject_forks }}
          error_on_failure: ${{ matrix.error_on_failure }}

      - name: Assert Outputs and Exit Code
        env:
          TEST_NAME: ${{ matrix.name }}
          VERIFIED: ${{ steps.test.outputs.verified }}
          EXPECTED_VERIFIED: ${{ matrix.expected_verified }}
          SHOULD_FAIL: ${{ matrix.should_fail }}
          OUTCOME: ${{ steps.test.outcome }}
        run: |
          echo "Test: $TEST_NAME"
          echo "Outcome: $OUTCOME"
          echo "Outputs:"
          echo "  verified: $VERIFIED (expected: $EXPECTED_VERIFIED)"

          FAILED=0

          if [ "$VERIFIED" != "$EXPECTED_VERIFIED" ]; then
            echo "::error::verified output mismatch! Got '$VERIFIED', expected '$EXPECTED_VERIFIED'"
            FAILED=1
          fi

          if [ "$SHOULD_FAIL" == "true" ]; then
            if [ "$OUTCOME" != "failure" ]; then
              echo "::error::Expected step to fail but it succeeded!"
              FAILED=1
            else
              echo "✅ Step failed as expected"
            fi
          else
            if [ "$OUTCOME" != "success" ]; then
              echo "::error::Expected step to succeed but it failed!"
              FAILED=1
            else
              echo "✅ Step succeeded as expected"
            fi
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

          echo "✅ All checks passed"

  verify-combined-scenarios:
    name: Test Combined Scenarios
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # All combinations of branch pattern and fork checks
          - name: 'Both pass: pattern match + same repo'
            branch_pattern: '^feature/.*'
            head_ref: 'feature/test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'Branch fail + fork pass'
            branch_pattern: '^feature/.*'
            head_ref: 'bugfix/test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            expected_verified: 'false'
            expected_branch_verified: 'false'
            expected_fork_verified: 'true'

          - name: 'Branch pass + fork fail'
            branch_pattern: '^feature/.*'
            head_ref: 'feature/test'
            head_repo: 'forker/repo'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            expected_verified: 'false'
            expected_branch_verified: 'true'
            expected_fork_verified: 'false'

          - name: 'Both fail: pattern mismatch + fork'
            branch_pattern: '^feature/.*'
            head_ref: 'bugfix/test'
            head_repo: 'forker/repo'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            expected_verified: 'false'
            expected_branch_verified: 'false'
            expected_fork_verified: 'false'

          - name: 'No pattern + same repo (both auto-pass)'
            branch_pattern: ''
            head_ref: 'any-branch'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'No pattern + fork allowed'
            branch_pattern: ''
            head_ref: 'any-branch'
            head_repo: 'forker/repo'
            base_repo: 'owner/repo'
            reject_forks: 'false'
            expected_verified: 'true'
            expected_branch_verified: 'true'
            expected_fork_verified: 'true'

          - name: 'No pattern + fork rejected'
            branch_pattern: ''
            head_ref: 'any-branch'
            head_repo: 'forker/repo'
            base_repo: 'owner/repo'
            reject_forks: 'true'
            expected_verified: 'false'
            expected_branch_verified: 'true'
            expected_fork_verified: 'false'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Test (${{ matrix.name }})
        id: test
        uses: ./actions/helper/verify-branch-name
        with:
          branch_pattern: ${{ matrix.branch_pattern }}
          head_ref: ${{ matrix.head_ref }}
          head_repo_full_name: ${{ matrix.head_repo }}
          base_repo_full_name: ${{ matrix.base_repo }}
          reject_forks: ${{ matrix.reject_forks }}
          error_on_failure: 'false'

      - name: Assert All Outputs
        env:
          TEST_NAME: ${{ matrix.name }}
          VERIFIED: ${{ steps.test.outputs.verified }}
          BRANCH_VERIFIED: ${{ steps.test.outputs.branch_pattern_verified }}
          FORK_VERIFIED: ${{ steps.test.outputs.fork_verified }}
          EXPECTED_VERIFIED: ${{ matrix.expected_verified }}
          EXPECTED_BRANCH_VERIFIED: ${{ matrix.expected_branch_verified }}
          EXPECTED_FORK_VERIFIED: ${{ matrix.expected_fork_verified }}
        run: |
          echo "Test: $TEST_NAME"
          echo "Outputs:"
          echo "  verified: $VERIFIED (expected: $EXPECTED_VERIFIED)"
          echo "  branch_pattern_verified: $BRANCH_VERIFIED (expected: $EXPECTED_BRANCH_VERIFIED)"
          echo "  fork_verified: $FORK_VERIFIED (expected: $EXPECTED_FORK_VERIFIED)"

          FAILED=0

          if [ "$VERIFIED" != "$EXPECTED_VERIFIED" ]; then
            echo "::error::verified output mismatch! Got '$VERIFIED', expected '$EXPECTED_VERIFIED'"
            FAILED=1
          fi

          if [ "$BRANCH_VERIFIED" != "$EXPECTED_BRANCH_VERIFIED" ]; then
            echo "::error::branch_pattern_verified output mismatch! Got '$BRANCH_VERIFIED', expected '$EXPECTED_BRANCH_VERIFIED'"
            FAILED=1
          fi

          if [ "$FORK_VERIFIED" != "$EXPECTED_FORK_VERIFIED" ]; then
            echo "::error::fork_verified output mismatch! Got '$FORK_VERIFIED', expected '$EXPECTED_FORK_VERIFIED'"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

          echo "✅ All outputs match expected values"

  verify-input-validation:
    name: Test Input Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Invalid boolean values should fail during validation
          - name: 'Invalid reject_forks value'
            reject_forks: 'invalid'
            error_on_failure: 'false'
            head_ref: 'test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            should_fail: true

          - name: 'Invalid error_on_failure value'
            reject_forks: 'true'
            error_on_failure: 'invalid'
            head_ref: 'test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            should_fail: true

          # Valid boolean variations
          - name: 'Valid reject_forks=true'
            reject_forks: 'true'
            error_on_failure: 'false'
            head_ref: 'test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            should_fail: false

          - name: 'Valid reject_forks=false'
            reject_forks: 'false'
            error_on_failure: 'false'
            head_ref: 'test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            should_fail: false

          - name: 'Valid error_on_failure=true'
            reject_forks: 'false'
            error_on_failure: 'true'
            head_ref: 'test'
            head_repo: 'owner/repo'
            base_repo: 'owner/repo'
            should_fail: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run Test (${{ matrix.name }})
        id: test
        continue-on-error: ${{ matrix.should_fail }}
        uses: ./actions/helper/verify-branch-name
        with:
          head_ref: ${{ matrix.head_ref }}
          head_repo_full_name: ${{ matrix.head_repo }}
          base_repo_full_name: ${{ matrix.base_repo }}
          reject_forks: ${{ matrix.reject_forks }}
          error_on_failure: ${{ matrix.error_on_failure }}
          branch_pattern: '.*'

      - name: Assert Exit Code
        env:
          TEST_NAME: ${{ matrix.name }}
          SHOULD_FAIL: ${{ matrix.should_fail }}
          OUTCOME: ${{ steps.test.outcome }}
        run: |
          echo "Test: $TEST_NAME"
          echo "Outcome: $OUTCOME"

          if [ "$SHOULD_FAIL" == "true" ]; then
            if [ "$OUTCOME" != "failure" ]; then
              echo "::error::Expected validation to fail but it succeeded!"
              exit 1
            else
              echo "✅ Validation failed as expected"
            fi
          else
            if [ "$OUTCOME" != "success" ]; then
              echo "::error::Expected validation to succeed but it failed!"
              exit 1
            else
              echo "✅ Validation succeeded as expected"
            fi
          fi
